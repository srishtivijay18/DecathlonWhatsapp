*{

    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#ffffff;
    padding:40px 20px;
}

.container{
    max-width:850px;
    margin:auto;
    background:#3643BA;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h1{
    color:white;
    font-size:48px;
    font-weight:700;
}

hr{
    border:none;
    height:2px;
    width:90%;
    margin:25px auto;
    background:rgba(255,255,255,0.5);
}

.subtitle{
    color:white;
    font-size:22px;
    margin-bottom:25px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    text-decoration:none;
    color:white;

    width:90%;
    margin:14px auto;
    padding:18px 24px;

    border:2px solid rgba(255,255,255,0.85);
    border-radius:14px;

    transition:0.3s;
}

.btn:hover{
    background:rgba(255,255,255,0.08);
}

.left,
.right{
    width:45px;
    text-align:center;
    font-size:30px;
}

.divider{
    width:2px;
    height:40px;
    background:rgba(255,255,255,0.7);
}

.text{
    flex:1;
    text-align:left;
    padding:0 18px;
    font-size:24px;
    font-weight:600;
}

.fa-whatsapp{
    color:#25D366;
}

.footer{
    color:white;
    margin-top:25px;
    font-size:18px;
}

/* ========================= */
/* MOBILE VERSION */
/* ========================= */

@media screen and (max-width:600px){

    body{

    }

    .container{

        border-radius:16px;
    }

    h1{
        font-size:28px;
        line-height:1.2;
    }

    hr{
        margin:15px auto;
    }

    .subtitle{
        font-size:16px;
        margin-bottom:15px;
    }

    .btn{
        width:100%;
        margin:8px 0;
        padding:12px;
        border-radius:10px;

    .left,
    .right{

        font-size:20px;
    }

    .divider{
        height:24px;

    }

    .text{
        font-size:16px;
        padding:0 8px;
    }

    .footer{
        font-size:13px;
        margin-top:15px;
    }
}
